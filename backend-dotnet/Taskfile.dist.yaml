version: "3"

tasks:
  setup:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - dotnet restore
    sources:
      - backend-dotnet.csproj
    desc: "Set up the development environment"

  build:
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - setup
    cmds:
      - dotnet build --no-restore
    desc: "Build the backend project"
  run:
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - build
    env:
      CinemadleTestMode: "true"
      ASPNETCORE_ENVIRONMENT: "Development"
    cmds:
      - dotnet run --no-build
    desc: "Run the backend project"
  test:
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - build
    cmds:
      - cd ../backend-unittest && dotnet test
    desc: "Run unit tests"
  generate-e2e-config:
      dir: "{{.TASKFILE_DIR}}"
      cmds:
        # we presume you have keys in here, not the committed appsettings.json
        - base64 appsettings.Development.json
      desc: "Generate base64 encoded appsettings.Development.json"

  default:
    cmds:
      - task --list