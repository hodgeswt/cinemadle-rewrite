services:
  cinemadle-backend:
    container_name: cinemadle
    image: cinemadle-e2e:latest
    pull_policy: never
    ports:
      - 5000:5566
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CINEMADLE_TEST_MODE=true
    volumes:
      - ./volumes:/root/.local/share/AppData
      - type: bind
        source: ./volumes/appsettings.json
        target: /app/appsettings.json
      - type: bind
        source: ./volumes/appsettings.Development.json
        target: /app/appsettings.Development.json
    restart: no
    networks:
      - cinemadle-network

  cinemadle-frontend:
    container_name: cinemadle-frontend
    image: cinemadle-frontend-e2e:latest
    pull_policy: never
    ports:
      - 8080:80
    restart: no
    networks:
      - cinemadle-network

networks:
  cinemadle-network:
    driver: bridge